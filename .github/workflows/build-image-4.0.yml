name: Build & publish 4.0 image

# Builds the SPT 4.0 server image from source for amd64 AND arm64 — each on a
# NATIVE runner (no QEMU) — and publishes one multi-arch tag to GHCR. This is the
# whole image-maintenance story: bump SPT, run this, done. Fika/ModSync are runtime
# (downloaded at boot from env vars), so they NEVER need a rebuild.
#
# To publish: Actions tab → this workflow → "Run workflow" → enter the SPT version.
# Auth is the built-in GITHUB_TOKEN — no PAT, no docker login on any machine.

on:
  workflow_dispatch:
    inputs:
      spt_version:
        description: "SPT version — a valid tag of sp-tarkov/server-csharp (e.g. 4.0.13)"
        required: true
        default: "4.0.13"
      tag_latest:
        description: "Also move the :latest tag to this build"
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE: dildz/spt-fika-server   # GHCR needs lowercase; the configurator's compose pulls this exact name

jobs:
  # Build each arch on its own native runner, push by digest (no tag yet).
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm   # GitHub's native arm64 runner (free on public repos)
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push by digest (${{ matrix.arch }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./image
          platforms: ${{ matrix.platform }}
          build-args: |
            SPT_MAJOR=4
            SPT_VERSION=${{ inputs.spt_version }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Save digest
        run: |
          digest="${{ steps.build.outputs.digest }}"
          mkdir -p /tmp/digests
          touch "/tmp/digests/${digest#sha256:}"   # no colon in the filename — keeps upload-artifact happy

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Stitch the two per-arch digests into one multi-arch tag (pure registry metadata).
  merge:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Create & push manifest list
        working-directory: /tmp/digests
        run: |
          tags="-t ${REGISTRY}/${IMAGE}:${{ inputs.spt_version }}"
          [ "${{ inputs.tag_latest }}" = "true" ] && tags="$tags -t ${REGISTRY}/${IMAGE}:latest"
          docker buildx imagetools create $tags \
            $(for d in *; do printf '%s@sha256:%s ' "${REGISTRY}/${IMAGE}" "$d"; done)

      - name: Show published manifest
        run: docker buildx imagetools inspect "${REGISTRY}/${IMAGE}:${{ inputs.spt_version }}"
